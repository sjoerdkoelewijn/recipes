<div id="filterPanel" class="filter-panel" data-open="false">
  <span class="filter-heading">Filter op</span>
  <div id="filterChips" class="tag-select"></div>
</div>

<main id="app"></main>

<button id="addBtn" class="fab" aria-label="Nieuw recept">+</button>

<template id="tpl-list">
  <div id="cardGrid" class="card-grid"></div>
  <p id="emptyState" class="empty" hidden>Nog geen recepten. Tik op + om je eerste toe te voegen.</p>
  <p id="loadingState" class="empty">Laden…</p>
</template>

<template id="tpl-card">
  <a class="card" href="#">
    <div class="card-img"><img alt=""></div>
    <div class="card-body">
      <h3></h3>
      <div class="card-tags"></div>
    </div>
  </a>
</template>

<template id="tpl-detail">
  <div class="detail-photo"><img alt=""></div>
  <h2 id="detailTitle" class="detail-title"></h2>

  <div class="scale-box">
    <span class="scale-label">Totaalgewicht</span>
    <div class="scale-readout">
      <button class="scale-step" data-dir="-1">&#8722;</button>
      <input id="weightInput" class="scale-display" type="number" inputmode="decimal" step="1">
      <span class="scale-unit">g</span>
      <button class="scale-step" data-dir="1">&#43;</button>
    </div>
    <button id="resetScaleBtn" class="linkbtn">herstel origineel</button>
  </div>

  <section id="sec-ingredients">
    <h3 class="section-heading">Ingrediënten</h3>
    <ul id="ingredientList" class="ingredient-list"></ul>
  </section>

  <section id="sec-steps">
    <h3 class="section-heading">Stappen</h3>
    <ol id="stepList" class="step-list"></ol>
  </section>

  <div class="detail-actions">
    <button id="editBtn" class="secondarybtn">Recept bewerken</button>
  </div>

  <nav class="detail-jump" aria-label="Spring naar sectie">
    <div class="detail-jump-inner">
      <button type="button" class="jumpbtn" data-target="sec-ingredients">Ingrediënten</button>
      <button type="button" class="jumpbtn" data-target="sec-steps">Stappen</button>
    </div>
  </nav>
</template>

<template id="tpl-form">
  <form id="recipeForm" class="recipe-form">
    <label class="field">
      <span>Titel</span>
      <input id="f-title" type="text" required>
    </label>

    <label class="field">
      <span>Foto</span>
      <input id="f-image" type="file" accept="image/*">
      <img id="f-imagePreview" class="image-preview" hidden alt="">
    </label>

    <div class="field">
      <span>Tags</span>
      <div id="tagChips" class="tag-select"></div>
    </div>

    <h3 class="section-heading">Ingrediënten</h3>
    <div id="ingredientRows" class="ingredient-rows"></div>
    <button type="button" id="addIngredientBtn" class="secondarybtn small">+ Ingrediënt toevoegen</button>

    <h3 class="section-heading">Stappen</h3>
    <p class="hint">Tik op een ingrediënt-chip om de hoeveelheid in de geselecteerde stap te plaatsen.</p>
    <div id="ingredientChips" class="chip-row"></div>
    <div id="stepRows" class="step-rows"></div>
    <button type="button" id="addStepBtn" class="secondarybtn small">+ Stap toevoegen</button>

    <div class="form-actions">
      <button type="button" id="deleteBtn" class="dangerbtn" hidden>Recept verwijderen</button>
      <button type="submit" id="saveBtn" class="primarybtn">Recept opslaan</button>
    </div>
    <p id="formStatus" class="form-status" hidden></p>
  </form>
</template>

<template id="tpl-settings">
  <form id="settingsForm" class="recipe-form">
    <p class="hint">Deze gegevens koppelen de app aan je GitHub-repo. Ze worden alleen in de browser van dit apparaat opgeslagen — nergens anders geüpload.</p>
    <label class="field">
      <span>GitHub-gebruikersnaam of -organisatie</span>
      <input id="s-owner" type="text" autocomplete="off" required>
    </label>
    <label class="field">
      <span>Naam van de repository</span>
      <input id="s-repo" type="text" autocomplete="off" required>
    </label>
    <label class="field">
      <span>Branch</span>
      <input id="s-branch" type="text" value="main" autocomplete="off">
    </label>
    <label class="field">
      <span>Personal access token (Contents: Read &amp; write)</span>
      <input id="s-token" type="password" autocomplete="off" required>
    </label>
    <div class="form-actions">
      <button type="submit" class="primarybtn">Opslaan</button>
    </div>
    <p id="settingsStatus" class="form-status" hidden></p>
  </form>
</template>

<script src="app.js?v=8"></script>
</body>
</html>
