<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kookboek</title>
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <button id="backBtn" class="iconbtn" aria-label="Back" hidden>&#8592;</button>
  <h1 id="topTitle" class="topbar-title">Kookboek</h1>
  <button id="settingsBtn" class="iconbtn" aria-label="Settings">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
      <path d="M19 7.49998H11.372C11.2167 7.06129 10.9293 6.68151 10.5493 6.4129C10.1693 6.14429 9.71536 6.00006 9.25 6.00006C8.78464 6.00006 8.33072 6.14429 7.95071 6.4129C7.57069 6.68151 7.28327 7.06129 7.128 7.49998H5V8.99998H7.128C7.28281 9.43913 7.57006 9.81943 7.95013 10.0884C8.3302 10.3574 8.78436 10.5019 9.25 10.5019C9.71564 10.5019 10.1698 10.3574 10.5499 10.0884C10.9299 9.81943 11.2172 9.43913 11.372 8.99998H19V7.49998ZM19 15H16.872C16.7167 14.5613 16.4293 14.1815 16.0493 13.9129C15.6693 13.6443 15.2154 13.5001 14.75 13.5001C14.2846 13.5001 13.8307 13.6443 13.4507 13.9129C13.0707 14.1815 12.7833 14.5613 12.628 15H5V16.5H12.628C12.7833 16.9387 13.0707 17.3185 13.4507 17.5871C13.8307 17.8557 14.2846 17.9999 14.75 17.9999C15.2154 17.9999 15.6693 17.8557 16.0493 17.5871C16.4293 17.3185 16.7167 16.9387 16.872 16.5H19V15Z"/>
    </svg>
  </button>
</header>

<main id="app"></main>

<button id="addBtn" class="fab" aria-label="New recipe">+</button>

<template id="tpl-list">
  <div class="searchwrap" data-expanded="false">
    <button id="searchToggle" class="searchtoggle" type="button" aria-label="Search recipes" aria-expanded="false">
      <svg class="searchtoggle-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
        <path d="M21 21L16.657 16.657M16.657 16.657C17.3998 15.9141 17.9891 15.0322 18.3912 14.0616C18.7932 13.0909 19.0002 12.0506 19.0002 11C19.0002 9.94942 18.7932 8.90911 18.3912 7.93848C17.9891 6.96785 17.3998 6.08591 16.657 5.34302C15.9141 4.60014 15.0321 4.01084 14.0615 3.6088C13.0909 3.20675 12.0506 2.99982 11 2.99982C9.94936 2.99982 8.90905 3.20675 7.93842 3.6088C6.96779 4.01084 6.08585 4.60014 5.34296 5.34302C3.84263 6.84335 2.99976 8.87824 2.99976 11C2.99976 13.1218 3.84263 15.1567 5.34296 16.657C6.84329 18.1574 8.87818 19.0002 11 19.0002C13.1217 19.0002 15.1566 18.1574 16.657 16.657Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <input id="searchInput" type="search" placeholder="Search recipes…" autocomplete="off" hidden>
  </div>
  <div id="cardGrid" class="card-grid"></div>
  <p id="emptyState" class="empty" hidden>No recipes yet. Tap + to add your first one.</p>
  <p id="loadingState" class="empty">Loading…</p>
</template>

<template id="tpl-card">
  <a class="card" href="#">
    <div class="card-img"><img alt=""></div>
    <div class="card-body">
      <h3></h3>
      <span class="weight-pill"></span>
    </div>
  </a>
</template>

<template id="tpl-detail">
  <div class="detail-photo"><img alt=""></div>
  <h2 id="detailTitle" class="detail-title"></h2>

  <div class="scale-box">
    <span class="scale-label">Total weight</span>
    <div class="scale-readout">
      <button class="scale-step" data-dir="-1">&#8722;</button>
      <input id="weightInput" class="scale-display" type="number" inputmode="decimal" step="1">
      <span class="scale-unit">g</span>
      <button class="scale-step" data-dir="1">&#43;</button>
    </div>
    <button id="resetScaleBtn" class="linkbtn">reset to original</button>
  </div>

  <section>
    <h3 class="section-heading">Ingredients</h3>
    <ul id="ingredientList" class="ingredient-list"></ul>
  </section>

  <section>
    <h3 class="section-heading">Steps</h3>
    <ol id="stepList" class="step-list"></ol>
  </section>

  <div class="detail-actions">
    <button id="editBtn" class="secondarybtn">Edit recipe</button>
  </div>
</template>

<template id="tpl-form">
  <form id="recipeForm" class="recipe-form">
    <label class="field">
      <span>Title</span>
      <input id="f-title" type="text" required>
    </label>

    <label class="field">
      <span>Photo</span>
      <input id="f-image" type="file" accept="image/*">
      <img id="f-imagePreview" class="image-preview" hidden alt="">
    </label>

    <h3 class="section-heading">Ingredients</h3>
    <div id="ingredientRows" class="ingredient-rows"></div>
    <button type="button" id="addIngredientBtn" class="secondarybtn small">+ Add ingredient</button>

    <h3 class="section-heading">Steps</h3>
    <p class="hint">Tap an ingredient chip to insert its amount into the focused step.</p>
    <div id="ingredientChips" class="chip-row"></div>
    <div id="stepRows" class="step-rows"></div>
    <button type="button" id="addStepBtn" class="secondarybtn small">+ Add step</button>

    <div class="form-actions">
      <button type="button" id="deleteBtn" class="dangerbtn" hidden>Delete recipe</button>
      <button type="submit" id="saveBtn" class="primarybtn">Save recipe</button>
    </div>
    <p id="formStatus" class="form-status" hidden></p>
  </form>
</template>

<template id="tpl-settings">
  <form id="settingsForm" class="recipe-form">
    <p class="hint">These connect the app to your GitHub repo. Stored only in this phone's browser — never uploaded anywhere else.</p>
    <label class="field">
      <span>GitHub username or org</span>
      <input id="s-owner" type="text" autocomplete="off" required>
    </label>
    <label class="field">
      <span>Repository name</span>
      <input id="s-repo" type="text" autocomplete="off" required>
    </label>
    <label class="field">
      <span>Branch</span>
      <input id="s-branch" type="text" value="main" autocomplete="off">
    </label>
    <label class="field">
      <span>Personal access token (Contents: Read & write)</span>
      <input id="s-token" type="password" autocomplete="off" required>
    </label>
    <div class="form-actions">
      <button type="submit" class="primarybtn">Save</button>
    </div>
    <p id="settingsStatus" class="form-status" hidden></p>
  </form>
</template>

<script src="app.js"></script>
</body>
</html>
